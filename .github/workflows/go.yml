name: Go

on:
  push:
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.15'
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Build
        run: go build -v .
